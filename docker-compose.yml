services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  s3:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  s3-init:
    image: minio/mc
    depends_on:
      s3:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://s3:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};

      echo 'Creating bucket...';
      /usr/bin/mc mb --ignore-existing local/$${MINIO_BUCKET_NAME};

      echo 'Making bucket public...';
      /usr/bin/mc anonymous set download local/$${MINIO_BUCKET_NAME};

      echo 'MinIO init done.';
      "

  gateway:
    build:
      context: .
      dockerfile: realms/gateway/Dockerfile
      target: dev
    depends_on:
      - codex
      - vault
      - citizen
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CODEX_REALM_URL: "http://codex:3001"
      VAULT_REALM_URL: "http://vault:3002"
      CITIZEN_REALM_URL: "http://citizen:3003"
    volumes:
      - ./realms/gateway/src:/app/realms/gateway/src

  codex-migrate:
    build:
      context: .
      dockerfile: realms/codex/Dockerfile
      target: installer
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    working_dir: /app/realms/codex
    command: npm run prisma:migrate:deploy

  codex:
    build:
      context: .
      dockerfile: realms/codex/Dockerfile
      target: dev
    depends_on:
      codex-migrate:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    volumes:
      - ./realms/codex/src:/app/realms/codex/src
      - ./packages/core/src:/app/packages/core/src

  vault:
    build:
      context: .
      dockerfile: realms/vault/Dockerfile
      target: dev
    depends_on:
      s3-init:
        condition: service_completed_successfully
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      S3_ENDPOINT: http://s3:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${MINIO_BUCKET_NAME}
      S3_REGION: default
    volumes:
      - ./realms/vault/src:/app/realms/vault/src

  citizen:
    build:
      context: .
      dockerfile: realms/citizen/Dockerfile
      target: dev
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
    volumes:
      - ./realms/citizen/src:/app/realms/citizen/src

  council:
    build:
      context: .
      dockerfile: apps/council-web/Dockerfile
      target: dev
    depends_on:
      - gateway
    ports:
      - "5175:5175"
    environment:
      PORT: 5175
      GATEWAY_URL: http://gateway:3000
    volumes:
      - ./apps/council-web/src:/app/apps/council-web/src

volumes:
  postgres_data:
  minio_data:
