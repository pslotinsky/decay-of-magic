version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: docker
    directories:
      - /realms/citizen
      - /realms/universe
      - /realms/codex
      - /realms/vault
      - /realms/gateway
      - /apps/council-web
    schedule:
      interval: weekly
    groups:
      docker:
        patterns:
          - '*'
