name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/*/dist
            apps/*/dist
            realms/*/dist
            node_modules/.prisma/client

  lint:
    name: Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Check
        run: npm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Test
        run: npx turbo test:unit

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: dist

      - name: Relink workspace bins
        run: |
          chmod +x packages/poe/dist/index.js
          npm rebuild --workspaces

      - name: Regenerate docs
        run: npx turbo run docs

      - name: Assert docs are up to date
        run: |
          if ! git diff --quiet; then
            echo "::error::README files are out of date. Run 'npm run docs' and commit the result."
            git diff
            exit 1
          fi

  test-api:
    name: API Tests (${{ matrix.realm }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        realm: [citizen, universe]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: dist

      - name: API Tests
        run: npx turbo test:api --filter=${{ matrix.realm }}
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/${{ matrix.realm }}
